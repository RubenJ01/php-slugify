when:
  - event: [push, pull_request, manual]

steps:
  - name: test
    image: php:8.1-cli
    commands:
      - apt-get update -qq && apt-get install -y -qq git unzip libicu-dev > /dev/null
      - docker-php-ext-install intl > /dev/null
      - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
      - composer install --no-interaction --prefer-dist --quiet
      - echo "══════ PHP CodeSniffer (PSR-12) ══════"
      - vendor/bin/phpcs --standard=PSR12 src/
      - echo "══════ PHPStan (Level 9) ══════"
      - vendor/bin/phpstan analyse --configuration=phpstan.neon --no-progress
      - echo "══════ PHPUnit ══════"
      - vendor/bin/phpunit --colors=always
